<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NotasPat - Importar Notas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="import.css">
</head>
<body>
  <div class="import-container">
    <!-- Header -->
    <header class="import-header">
      <div class="header-brand">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        <h1>NotasPat</h1>
      </div>
      <span class="subtitle">Importar Notas</span>
    </header>

    <!-- Área principal -->
    <div class="import-body">
      <!-- Estado: Seleção de arquivo -->
      <div id="stateSelect" class="import-state">
        <div id="dropArea" class="drop-area">
          <div class="drop-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </div>
          <div class="drop-text">Arraste o arquivo aqui</div>
          <div class="drop-divider"><span>ou</span></div>
          <button id="btnSelectFile" class="btn-primary">Selecionar arquivo .json</button>
          <input type="file" id="fileInput" accept=".json" style="display: none;">
          <div class="drop-hint">Arquivo exportado pelo NotasPat</div>
        </div>
      </div>

      <!-- Estado: Escolher modo (mesclar/substituir) -->
      <div id="stateMode" class="import-state" style="display: none;">
        <div class="mode-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--accent-primary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
          </svg>
        </div>
        <div id="modeFileInfo" class="mode-info"></div>
        <div class="mode-message" id="modeMessage"></div>
        <div class="mode-hint">Mesclar mantém suas notas atuais. Substituir apaga todas e importa apenas o arquivo.</div>
        <div class="mode-actions">
          <button id="btnMerge" class="btn-primary">Mesclar</button>
          <button id="btnReplace" class="btn-danger">Substituir</button>
          <button id="btnModeCancel" class="btn-secondary">Cancelar</button>
        </div>
      </div>

      <!-- Estado: Processando -->
      <div id="stateLoading" class="import-state" style="display: none;">
        <div class="loading-spinner"></div>
        <div class="loading-text">Importando notas...</div>
      </div>

      <!-- Estado: Sucesso -->
      <div id="stateSuccess" class="import-state" style="display: none;">
        <div class="result-icon success-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div class="result-text" id="successText">Notas importadas com sucesso!</div>
        <div class="result-hint">Você pode fechar esta aba.</div>
        <button id="btnClose" class="btn-primary">Fechar aba</button>
      </div>

      <!-- Estado: Erro -->
      <div id="stateError" class="import-state" style="display: none;">
        <div class="result-icon error-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </div>
        <div class="result-text" id="errorText">Erro ao importar</div>
        <div class="result-hint" id="errorHint"></div>
        <button id="btnRetry" class="btn-primary">Tentar novamente</button>
      </div>
    </div>
  </div>

  <script src="../lib/storage.js"></script>
  <script src="import.js"></script>
</body>
</html>
