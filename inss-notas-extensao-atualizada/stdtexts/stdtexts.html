<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NotasPat - Textos Padrão</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="stdtexts.css">
</head>
<body>
  <div class="stdtexts-container">
    <header class="stdtexts-header">
      <div class="header-brand">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
          <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
        </svg>
        <h1>Textos Padrão</h1>
      </div>
      <span class="subtitle">Gerenciar textos reutilizáveis</span>
    </header>

    <div class="stdtexts-body">
      <!-- Toolbar -->
      <div class="toolbar">
        <input type="text" id="searchInput" class="toolbar-search" placeholder="Buscar textos...">
        <div class="toolbar-actions">
          <button id="btnExport" class="btn-secondary btn-sm">Exportar</button>
          <button id="btnImportFile" class="btn-secondary btn-sm">Importar</button>
          <input type="file" id="fileInput" accept=".json" style="display: none;">
          <button id="btnNew" class="btn-primary btn-sm">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Novo
          </button>
        </div>
      </div>

      <!-- Form (hidden by default) -->
      <div id="formSection" class="form-section" style="display: none;">
        <div class="form-group">
          <label for="inputTitle">Título</label>
          <input type="text" id="inputTitle" maxlength="100" placeholder="Título do texto padrão">
          <span class="form-hint" id="titleHint">0/100</span>
        </div>
        <div class="form-group">
          <label for="inputText">Conteúdo</label>
          <textarea id="inputText" rows="6" placeholder="Conteúdo do texto padrão (mínimo 30 caracteres)"></textarea>
          <span class="form-hint" id="textHint">0 caracteres</span>
        </div>
        <div class="form-actions">
          <button id="btnFormCancel" class="btn-secondary">Cancelar</button>
          <button id="btnFormSave" class="btn-primary">Salvar</button>
        </div>
      </div>

      <!-- List -->
      <div id="textsList" class="texts-list"></div>

      <!-- Import Mode -->
      <div id="importSection" class="import-section" style="display: none;">
        <div class="import-info" id="importInfo"></div>
        <div class="import-actions">
          <button id="btnImportMerge" class="btn-primary">Mesclar</button>
          <button id="btnImportReplace" class="btn-danger">Substituir</button>
          <button id="btnImportCancel" class="btn-secondary">Cancelar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../lib/storage.js"></script>
  <script src="stdtexts.js"></script>
</body>
</html>
